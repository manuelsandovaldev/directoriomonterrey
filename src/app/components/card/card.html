<mat-card class="example-card" appearance="outlined">
    <mat-card-header>
      <div mat-card-avatar class="example-header-image"></div>
      <mat-card-title style="color: black;">{{conector?.title}}</mat-card-title>
    </mat-card-header>
    <img mat-card-image src="{{conector?.img}}" alt="Photo of a Shiba Inu">
    <mat-card-content>
      <p>
        {{conector?.description}}
      </p>
    </mat-card-content>
    <mat-card-actions>
      <button matButton>LIKE</button>
      <button matButton>SHARE</button>
      <a matIconButton href="https://www.instagram.com/" target="_blank" class="example-icon favorite-icon" aria-label="Icono de favorito">
        <mat-icon>favorite</mat-icon>
      </a>
    </mat-card-actions>
  </mat-card>
